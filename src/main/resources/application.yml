spring:
  application:
    name: Mosquizto-Backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    from: ${SPRING_MAIL_ADDRESS}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    host: smtp.gmail.com
    port: 587

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

open-api:
  service:
    title: Api Service
    version: v1.0
    server-url: ${SERVER_URL}
    server-name: localhost

jwt:
  expiryHour: 1
  expiryDay: 14
  accessKey: ${JWT_ACCESS_KEY}
  refreshKey: ${JWT_REFRESH_KEY}
  resetKey: ${JWT_RESET_KEY}

google:
  client-id: ${GOOGLE_CLIENT_ID}

meilisearch:
  host: ${MEILI_SEARCH_HOST}
  masterKey: ${MEILI_MASTER_KEY}

endpoint:
  confirmUser: ${SERVER_URL}user/confirm
