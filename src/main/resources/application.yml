spring:
  application:
    name: Mosquizto-Backend
  websocket:
    message-time-out: ${WS_MESSAGE_TIME_OUT}
    connect-endpoint: ${WS_CONNECT_ENDPOINT}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sendgrid:
    api-key: ${SEND_GRID:}

  mail:
    from: ${SPRING_MAIL_ADDRESS}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    host: smtp.gmail.com
    port: 587

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

open-api:
  service:
    title: Api Service
    version: v1.0
    server-url: ${SERVER_URL:http://localhost:8080/}
    server-name: ${SERVER_NAME:localhost}

jwt:
  expiryHour: 1
  expiryDay: 14
  accessKey: ${JWT_ACCESS_KEY}
  refreshKey: ${JWT_REFRESH_KEY}
  resetKey: ${JWT_RESET_KEY}

google:
  client-id: ${GOOGLE_CLIENT_ID}

meilisearch:
  host: ${MEILI_SEARCH_HOST}
  masterKey: ${MEILI_MASTER_KEY}
cloudinary:
  name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

endpoint:
  confirmUser: ${SERVER_URL}user/confirm

app:
  mail:
    provider: ${APP_MAIL_PROVIDER:smtp}
    from: ${MAIL_FROM:no-reply@cskh-group.com}
    from-name: ${MAIL_NAME:Mosquizto Support}
