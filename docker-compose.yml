services:
  postgres:
    image: postgres:16
    container_name: mosquizto_dbpg
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mosquizto_redis
    hostname: redis
    command: redis-server --rename-command FLUSHDB "" --rename-command FLUSHALL ""
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: mosquizto_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}?options=-c%20timezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_MAIL_ADDRESS: ${MAIL_ADDRESS}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_MAIL_PROVIDER: ${APP_MAIL_PROVIDER:-smtp}
      SEND_GRID: ${SEND_GRID:-}
      JWT_ACCESS_KEY: ${JWT_ACCESS_KEY}
      JWT_REFRESH_KEY: ${JWT_REFRESH_KEY}
      JWT_RESET_KEY: ${JWT_RESET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SERVER_URL: http://${VPS_IP:-localhost}:8080/
      MEILI_SEARCH_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      WS_MESSAGE_TIME_OUT: ${WS_MESSAGE_TIME_OUT}
      WS_CONNECT_ENDPOINT: ${WS_CONNECT_ENDPOINT}
      CLOUDINARY_NAME: ${CLOUDINARY_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.7.2
    container_name: mosquizto_meilisearch
    ports:
      - "7700:7700"
    volumes:
      - ./meili_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=development
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7700/health" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mosquizto_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
volumes:
  pg_data:
  redis_data:
  meilisearch:
  qdrant_data:
